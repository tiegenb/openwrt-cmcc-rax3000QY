name: Build RAX30000QY QSDK12.5

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  # 强制 actions 使用 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/everything411/qsdk
  REPO_BRANCH: 12.5.2783.2994
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: QSDK12.5test.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt update
        sudo apt install build-essential clang flex g++ gawk gcc-multilib gettext \
        git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # 初始空间检查
        echo "=== Initial disk space ==="
        df -h
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |        
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        
    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Add custom packages and modify LAN IP
      run: |
        cd openwrt
        
        # 添加软件包配置
        cat >> .config << EOF
        
        # 添加 WWAN3 相关软件包
        CONFIG_PACKAGE_wwan=y
        CONFIG_PACKAGE_comgt=y
        CONFIG_PACKAGE_comgt-directip=y
        CONFIG_PACKAGE_comgt-ncm=y
        CONFIG_PACKAGE_umbim=y
        CONFIG_PACKAGE_uqmi=y
        CONFIG_PACKAGE_modemmanager=y
        CONFIG_PACKAGE_libmbim=y
        CONFIG_PACKAGE_libqmi=y
        
        # 无线安全工具
        CONFIG_PACKAGE_aircrack-ng=y
        CONFIG_PACKAGE_airmon-ng=y
        CONFIG_PACKAGE_hcxdumptool=y
        CONFIG_PACKAGE_hcxtools=y
        
        # Material 主题
        CONFIG_PACKAGE_luci-theme-material=y
        CONFIG_PACKAGE_luci-i18n-material-zh-cn=y
        
        EOF
        
        # 方法1: 修改 config_generate 文件（如果存在）
        if [ -f "package/base-files/files/bin/config_generate" ]; then
          echo "Modifying LAN IP in config_generate"
          sed -i 's/192.168.1.1/192.168.66.1/g' package/base-files/files/bin/config_generate
        fi
        
        # 方法2: 创建 uci-defaults 脚本（最可靠的方法）
        echo "Creating uci-defaults script to set LAN IP"
        mkdir -p package/base-files/files/etc/uci-defaults
        cat > package/base-files/files/etc/uci-defaults/99_set_lan_ip << 'EOF'
        #!/bin/sh
        # 设置 LAN IP 为 192.168.66.1
        uci set network.lan.ipaddr='192.168.66.1'
        uci commit network
        # 同时修改 DHCP 网关选项
        uci set dhcp.lan.dhcp_option='3,192.168.66.1'
        uci commit dhcp
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/99_set_lan_ip
        
        # 方法3: 修改 package/base-files 中的默认配置
        if [ -f "package/base-files/files/lib/functions/uci-defaults.sh" ]; then
          echo "Also patching uci-defaults.sh"
          sed -i 's/192.168.1.1/192.168.66.1/g' package/base-files/files/lib/functions/uci-defaults.sh 2>/dev/null || true
        fi
        
        # 验证修改
        echo "=== LAN IP modification summary ==="
        echo "uci-defaults script created:"
        cat package/base-files/files/etc/uci-defaults/99_set_lan_ip
        echo ""
        
    # ========== 空间清理步骤 1: 下载前清理 ==========
    - name: Clean before download
      run: |
        echo "=== Cleaning before download ==="
        cd openwrt
        
        # 清理旧的下载缓存（保留最近3天）
        find dl -type f -atime +3 -delete 2>/dev/null || true
        
        # 清理临时文件
        rm -rf tmp/*
        rm -rf staging_dir/*
        rm -rf build_dir/target-* 2>/dev/null || true
        
        echo "Space after cleaning:"
        df -h .
        
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    # ========== 空间清理步骤 2: 下载后清理 ==========
    - name: Clean after download
      run: |
        echo "=== Cleaning after download ==="
        cd openwrt
        
        # 清理不需要的下载文件
        find dl -name "*.tmp" -delete
        find dl -name "*.lock" -delete
        
        # 清理 git 临时文件
        find . -name ".git" -type d -prune -exec rm -rf {} \; 2>/dev/null || true
        
        echo "Space after download cleaning:"
        df -h .
        
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        
        # 限制并行编译数，避免内存不足
        make -j$(($(nproc) / 2 + 1)) || make -j1 || make -j1 V=s
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    # ========== 空间清理步骤 3: 编译后清理 ==========
    - name: Clean after compilation
      if: always()
      run: |
        echo "=== Cleaning after compilation ==="
        cd openwrt
        
        # 删除编译中间文件，只保留最终固件
        rm -rf build_dir/target-*/*/{.pkgdir,.built,*.o,*.a,*.so} 2>/dev/null || true
        rm -rf staging_dir/target-*/* 2>/dev/null || true
        rm -rf staging_dir/host/bin 2>/dev/null || true
        rm -rf tmp/.config* 2>/dev/null || true
        
        # 清理日志文件
        find . -name "*.log" -size +10M -delete 2>/dev/null || true
        find . -name "*.log.*" -delete 2>/dev/null || true
        
        # 清理符号链接和临时文件
        find . -type l -xtype l -delete 2>/dev/null || true
        
        echo "Space after compilation cleaning:"
        df -h .
        
    - name: Check space usage
      if: (!cancelled())
      run: |
        echo "=== Final disk space usage ==="
        df -hT
        echo ""
        echo "=== Largest directories in openwrt ==="
        du -sh openwrt/* 2>/dev/null | sort -hr | head -10

    - name: List build output (Debug)
      if: always()
      run: |
        echo "=== Check if build produced any files ==="
        if [ -d "openwrt/bin" ]; then
          echo "bin directory exists, contents:"
          ls -la openwrt/bin/
          echo ""
          echo "=== Searching for firmware files ==="
          find openwrt/bin -type f \( -name "*.bin" -o -name "*.img" -o -name "*.ubi" -o -name "*.trx" \) -ls || echo "No firmware files found"
          echo ""
          echo "=== Firmware file sizes ==="
          find openwrt/bin -type f \( -name "*.bin" -o -name "*.img" -o -name "*.ubi" \) -exec ls -lh {} \; || echo "No firmware files found"
        else
          echo "ERROR: openwrt/bin directory not found!"
          echo "Build likely failed. Check compile step logs."
        fi

    - name: Upload bin directory (for debugging)
      uses: actions/upload-artifact@v4
      if: always() && steps.compile.outputs.status == 'success'
      with:
        name: OpenWrt_full_bin_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # 查找固件文件
        FIRMWARE_FILE=$(find openwrt/bin -type f \( -name "*.bin" -o -name "*.img" -o -name "*.ubi" \) | head -1)
        
        if [ -z "$FIRMWARE_FILE" ]; then
          echo "❌ No firmware files found in openwrt/bin!"
          echo "Available files in bin:"
          find openwrt/bin -type f 2>/dev/null || echo "  (none)"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        FIRMWARE_DIR=$(dirname "$FIRMWARE_FILE")
        cd "$FIRMWARE_DIR"
        rm -rf packages 2>/dev/null || true
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "✅ Found firmware at: $PWD"
        echo "Firmware files:"
        ls -la

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_RAX3000QY_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        
    # ========== 最终清理步骤 ==========
    - name: Final cleanup
      if: always()
      run: |
        echo "=== Final cleanup ==="
        # 删除工作目录释放空间
        sudo rm -rf /workdir
        sudo rm -rf openwrt
        
        # 清理 apt 缓存
        sudo apt clean
        sudo apt autoremove -y
        
        echo "Final disk space:"
        df -h
